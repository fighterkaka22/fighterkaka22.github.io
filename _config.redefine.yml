# ============================================================
# Hexo Theme Redefine
# ============================================================

info:
  name: hexo-theme-redefine
  version: 2.9.0
  docs: https://redefine-docs.ohevan.com/
  description: A simple & fast & pure theme for Hexo
  title: 昔我往矣
  subtitle: 记录生活与技术
  author: Yuki Sun
  url: https://fighterkaka22.github.io

# ============================================================
# Global Settings
# ============================================================
global:
  open_graph:
    enable: true
    image: /images/redefine-og.webp
    description: 记录生活与技术

# ============================================================
# Top Navigation Bar
# ============================================================
navbar:
  links:
    Home:
      path: /
      icon: fa-regular fa-house
    Archives:
      path: /archives
      icon: fa-regular fa-archive
    Tags:
      path: /tags
      icon: fa-regular fa-tags
    About:
      path: /about
      icon: fa-regular fa-user
  auto_hide: false
  color:
    left: "#f78736"
    right: "#367df7"
    transparency: 35
  text_color:
    light: "#fff"
    dark: "#d0d0d0"

# ============================================================
# Home Banner
# ============================================================
home_banner:
  enable: true
  style: fixed
  image:
    light: /images/IMG_7457.JPG
    dark: /images/IMG_7457.JPG
  title: 昔我往矣
  subtitle:
    text:
      - 记录生活与技术
    hitokoto:
      enable: false
    typing_speed: 100
    backing_speed: 80
    starting_delay: 500
    backing_delay: 1500
    loop: true
    smart_backspace: true
  text_color:
    light: "#fff"
    dark: "#d1d1b6"
  text_style:
    title_size: 2.8rem
    subtitle_size: 1.5rem
    line_height: 1.2

# ============================================================
# Home Page
# ============================================================
home:
  sidebar:
    enable: true
    position: left
    first_item: menu
  postlist:
    enable: true
    type: large

# ============================================================
# Article
# ============================================================
articles:
  style:
    font_size: 16px
    line_height: 1.75
    image_border_radius: 14px
    image_alignment: center
    image_caption: false
    link_icon: true
    title_alignment: left
  license:
    enable: false
  toc:
    enable: true
    max_depth: 3
    number: true
    expand: true
  copyright:
    enable: false
  lazyload: true

# ============================================================
# Code Block
# ============================================================
code_block:
  copy: true
  style: mac  # mac | simple
  font:
    enable: false

# ============================================================
# Comment
# ============================================================
comment:
  enable: false

# ============================================================
# Footer
# ============================================================
footer:
  since: 2026
  statistics:
    enable: true
  runtime:
    enable: false
  custom_text: ""

# ============================================================
# Sidebar
# ============================================================
sidebar:
  enable: true
  position: left
  first_item: menu  # menu | toc
  announcement:
    enable: false
  board:
    enable: true
    content: 记录生活与技术
  avatar:
    enable: true
    url: /images/avatar.png
    rounded: true
  author_info:
    enable: true
    name: Yuki
    show_level: false
  social_links:
    enable: false

# ============================================================
# Search
# ============================================================
search:
  enable: false

# ============================================================
# Plugins
# ============================================================
plugins:
  katex:
    enable: false
  mathjax:
    enable: false
  mermaid:
    enable: false
  aplayer:
    enable: false
  swiper:
    enable: false

# ============================================================
# Custom Font
# ============================================================
font:
  enable: false

# ============================================================
# CDN
# ============================================================
cdn:
  enable: false
